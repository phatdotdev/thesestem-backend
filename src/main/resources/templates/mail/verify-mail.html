<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f8;
            padding: 20px;
        }
        .container {
            max-width: 500px;
            background: #ffffff;
            margin: auto;
            padding: 24px;
            border-radius: 8px;
        }
        .header {
            text-align: center;
            color: #2c3e50;
        }
        .otp {
            font-size: 32px;
            font-weight: bold;
            color: #e74c3c;
            text-align: center;
            margin: 20px 0;
            letter-spacing: 6px;
        }
        .footer {
            font-size: 12px;
            color: #7f8c8d;
            text-align: center;
            margin-top: 20px;
        }
        .btn {
            display: block;
            width: fit-content;
            margin: 20px auto;
            padding: 10px 20px;
            background: #3498db;
            color: #fff;
            text-decoration: none;
            border-radius: 6px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2 class="header">Xác thực tài khoản</h2>

    <p>Xin chào <b th:text="${email}"></b>,</p>

    <p>Mã xác thực (OTP) của bạn là:</p>

    <div class="otp" th:text="${otp}"></div>

    <p>Mã có hiệu lực trong <b th:text="${expireMinutes}"></b> phút.</p>

    <p>Nếu bạn không thực hiện đăng ký, vui lòng bỏ qua email này.</p>

    <div class="footer">
        © 2026 Thesestem - Thesis Management System
    </div>
</div>

</body>
</html>
